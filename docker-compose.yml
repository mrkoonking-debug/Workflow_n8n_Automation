version: '3.8'

services:
  # ============================================
  # n8n — Workflow Automation Engine
  # ดึงข้อมูลจาก Google Sheets + ส่ง Email
  # ============================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n-equipment
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # อนุญาต CORS สำหรับ Vue.js frontend
      - N8N_EDITOR_BASE_URL=http://localhost:5678/
      # ตั้งค่า Timezone
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
    volumes:
      - n8n_data:/home/node/.n8n
    # Health check — ตรวจสอบว่า n8n ยังทำงาน
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Resource limits — ป้องกัน memory leak
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    # Log rotation — ป้องกัน log โตจนเต็ม disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
    driver: local
